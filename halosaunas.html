<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HaloSauna Logistics Report</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">

    <!-- NAV -->
    <div class="nav">
      <div class="nav-links">
        <span>HOME</span>
        <span class="home">HaloSaunas</span>
        <span>HaloSTARS</span>
        <span>HaloReds</span>
        <span>HaloGenerators</span>
      </div>

      <div class="nav-logo">
        <img src="logo.png" alt="Halotherapy Solutions" />
      </div>
    </div>

    <!-- TITLE DROPDOWN -->
    <div class="report-title-wrap">
      <div class="report-title-card">
        <span class="report-prefix">HaloSauna</span>
        <span class="report-text">Logistics Report -</span>
        <select id="monthSelect" class="report-month-select"></select>
      </div>
    </div>

    <!-- HEADERS -->
    <div class="sauna-header-row">
      <div></div>
      <div class="sauna-header">This Year<br><span>(2026)</span></div>
      <div class="sauna-header">Last Year<br><span>(2025)</span></div>
      <div class="sauna-header">Historical<br>Monthly Average</div>
    </div>

    <!-- ROWS -->
    <div class="sauna-grid">

      <!-- 1 PERSON -->
      <div class="sauna-label">1 Person</div>

      <div class="sauna-card">
        <div class="mini-label">MARCH</div>
        <div class="mini-label">YTD</div>
        <div class="mini-value">0</div>
        <div class="mini-value">0</div>
      </div>

      <div class="sauna-card">
        <div class="mini-label">MARCH</div>
        <div class="mini-label">YTD</div>
        <div class="mini-value">0</div>
        <div class="mini-value">0</div>
      </div>

      <div class="sauna-card single">
        <div class="mini-label">MARCH AVG</div>
        <div class="mini-value">0</div>
      </div>

      <!-- 2 PERSON -->
      <div class="sauna-label">2 Person</div>

      <div class="sauna-card">
        <div class="mini-label">MARCH</div>
        <div class="mini-label">YTD</div>
        <div class="mini-value">0</div>
        <div class="mini-value">0</div>
      </div>

      <div class="sauna-card">
        <div class="mini-label">MARCH</div>
        <div class="mini-label">YTD</div>
        <div class="mini-value">0</div>
        <div class="mini-value">0</div>
      </div>

      <div class="sauna-card single">
        <div class="mini-label">MARCH AVG</div>
        <div class="mini-value">0</div>
      </div>

      <!-- 3 PERSON -->
      <div class="sauna-label">3 Person</div>

      <div class="sauna-card">
        <div class="mini-label">MARCH</div>
        <div class="mini-label">YTD</div>
        <div class="mini-value">0</div>
        <div class="mini-value">0</div>
      </div>

      <div class="sauna-card">
        <div class="mini-label">MARCH</div>
        <div class="mini-label">YTD</div>
        <div class="mini-value">0</div>
        <div class="mini-value">0</div>
      </div>

      <div class="sauna-card single">
        <div class="mini-label">MARCH AVG</div>
        <div class="mini-value">0</div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
