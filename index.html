<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthly Logistics Report</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="nav">
      <div class="nav-links">
        <span class="home">HOME</span>
        <span>HaloSaunas</span>
        <span>HaloSTARS</span>
        <span>HaloReds</span>
        <span>HaloGenerators</span>
      </div>

      <div class="nav-logo">
        <img src="logo.png" alt="Halotherapy Solutions" />
      </div>
    </div>

    <div class="title-wrap">
      <div class="title-card" id="pageTitle">Monthly Logistics Report</div>
    </div>

    <div class="month-picker-wrap">
      <label for="monthSelect" class="month-picker-label">Select Month</label>
      <select id="monthSelect" class="month-select"></select>
    </div>

    <div class="status" id="status">Loading...</div>

    <div class="cards" id="cards" style="display: none;">
      <div class="summary-card">
        <div class="summary-title">HaloSaunas Shipped</div>
        <div class="summary-value" id="saunasValue">0</div>
      </div>

      <div class="summary-card">
        <div class="summary-title">HaloSTARS Shipped</div>
        <div class="summary-value" id="starsValue">0</div>
      </div>

      <div class="summary-card">
        <div class="summary-title">HaloReds Shipped</div>
        <div class="summary-value" id="redsValue">0</div>
      </div>

      <div class="summary-card">
        <div class="summary-title">HaloGenerators Shipped</div>
        <div class="summary-value" id="generatorsValue">0</div>
      </div>
    </div>

    <div class="sheet-link">
      <a id="sheetLink" href="#" target="_blank" rel="noreferrer">
        Link to full data sheet here
      </a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
